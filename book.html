<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <title>LU06.A02 - Buch</title>
  </head>
  <body>

  <form action="https://it.bzz.ch/demo/formdata/index.php" method="post">

    <div>
      <label for="title">Buchtitel</label>
      <input
          type="text"
          id="title"
          name="title"
          minlength="2"
          maxlength="30"
          required>
    </div>

    <div>
      <label for="author">Autor</label>
      <input
          type="text"
          id="author"
          name="author"
          minlength="5"
          maxlength="40">
    </div>

    <div>
      <label for="price">Preis</label>
      <input
          type="number"
          id="price"
          name="price"
          minlength="0.05"
          maxlength="99.95">
    </div>

    <div>
      <label for="date">Erscheinungsdatum</label>
      <input
          type="date"
          id="date"
          name="date">
    </div>

    <div>
      <label for="edition">Auflage</label>
      <input
          type="range"
          id="edition"
          name="edition"
          min="1"
          max="9">
    </div>

    <div>
      <button type="submit">Absenden</button>
      <button type="reset">Zurücksetzen</button>
    </div>

  </form>
  </body>
</html>
